<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кабінет Валерії 🦝</title>
<style>
    :root {
        --bg-main: #f3e8ff; 
        --border-color: #888; 
        --header-gradient: linear-gradient(135deg, #6c429c, #d93d5c);
        --sat-color: #e03131; --sun-color: #7048e8;
        --clr-марафон: #2f9e44; --clr-акція: #1971c2; --clr-фотозвіт_до_свята: #d6336c;
        --clr-профорієнтація: #e67700; --clr-фотозвіт_до_дати: #862e9c; --clr-фотозвіт: #495057;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); margin: 0; padding: 0; color: #212529; }
    
    .main-container { 
        display: flex; flex-direction: row; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; box-sizing: border-box;
    }

    .calendar-section { flex: 1; background: white; border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .stats-panel { width: 300px; background: white; border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); height: fit-content; }
    .day { height: 110px; padding: 8px; cursor: pointer; background: #fff; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); position: relative; z-index: 1; }
    .date-num { font-size: 16px; font-weight: bold; }
    .ev-badge { font-size: 12px; padding: 4px 6px; border-radius: 4px; margin-top: 5px; color: white; line-height: 1.2; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (max-width: 900px) {
        .main-container { flex-direction: column; padding: 10px; }
        .stats-panel { width: 100%; box-sizing: border-box; }
        .header { flex-direction: column; height: auto !important; padding: 15px 10px; text-align: center; }
        .header-controls { width: 100%; justify-content: center; margin-top: 10px; gap: 5px; }
        .day { height: 85px !important; padding: 4px !important; }
        .date-num { font-size: 13px !important; }
        .ev-badge { font-size: 9px !important; padding: 2px 4px !important; }
    }

    .header { width: 100%; background: var(--header-gradient); padding: 12px 25px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-radius: 0 0 15px 15px; position: relative; z-index: 10; }
    .header-controls { display: flex; gap: 10px; align-items: center; }
    
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
    .month-title { font-size: 20px; font-weight: bold; min-width: 160px; text-align: center; }
    
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border-color); border-left: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
    .week-day { background: #f1f3f5; padding: 10px; text-align: center; font-weight: bold; font-size: 13px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
    .is-weekend { background: #fafafa; } .is-holiday { background: #fff9db !important; }
    
    .cat-марафон { background: var(--clr-марафон); } .cat-акція { background: var(--clr-акція); } .cat-фотозвіт_до_свята { background: var(--clr-фотозвіт_до_свята); }
    .cat-профорієнтація { background: var(--clr-профорієнтація); } .cat-фотозвіт_до_дати { background: var(--clr-фотозвіт_до_дати); } .cat-фотозвіт { background: var(--clr-фотозвіт); }

    .stat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    .stat-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }

    #eventForm { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.3); z-index: 2000; width: 92%; max-width: 400px; display: none; border: 1px solid var(--border-color); box-sizing: border-box; }
    input, textarea, select { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .btn-save { background: #6c429c; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    /* ВИПРАВЛЕНО: Overlay тепер не блокує клітинки, коли форма закрита */
    .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:1500; backdrop-filter: blur(2px); }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="header">
    <div class="header-text">
        <h2 style="margin:0; font-size:20px;">Кабінет Валерії 🦝</h2>
        <p style="margin:2px 0 0 0; font-size:12px; opacity:0.8">2025-2026 н.р. • Хмарне збереження</p>
    </div>
    <div class="header-controls">
        <button onclick="goToday()" style="background:#fff; color:#6c429c; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:13px;">Сьогодні</button>
        <input type="text" id="searchInp" placeholder="Пошук..." oninput="render()" style="width:120px; border:none; border-radius:8px; padding:8px;">
        <button onclick="generateReport()" style="background:#fff; color:#6c429c; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:13px;">Звіт</button>
    </div>
</div>

<div class="main-container">
    <div class="calendar-section">
        <div class="month-nav">
            <button onclick="changeMonth(-1)" style="cursor:pointer; border:none; background:none; font-size:24px; color:#6c429c">❮</button>
            <div class="month-title" id="monthTitle"></div>
            <button onclick="changeMonth(1)" style="cursor:pointer; border:none; background:none; font-size:24px; color:#6c429c">❯</button>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="stats-panel">
        <div style="font-weight:bold; color:#6c429c; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:5px;">📊 Статистика місяця</div>
        <div id="statsContent"></div>
    </div>
</div>

<div id="eventForm">
    <h3 id="selectedDateText" style="margin:0 0 15px 0; color:#6c429c; text-align:center; font-size:20px;"></h3>
    <div style="font-size:14px; margin-bottom:12px; text-align:center;"><input type="checkbox" id="isHoliday" style="width:auto"> Святковий день</div>
    <select id="eventCategory">
        <option value="акція">Акція</option><option value="марафон">Марафон</option>
        <option value="фотозвіт_до_свята">Фотозвіт до свята</option><option value="профорієнтація">Профорієнтація</option>
        <option value="фотозвіт_до_дати">Фотозвіт до дати</option><option value="фотозвіт">Фотозвіт</option>
    </select>
    <input type="text" id="eventName" placeholder="Назва заходу">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <input type="text" id="eventClass" placeholder="Клас">
        <input type="text" id="eventTeacher" placeholder="Вчитель">
    </div>
    <input type="text" id="eventStudent" placeholder="ПІБ учня">
    <textarea id="eventDetails" placeholder="Примітки" rows="3"></textarea>
    <button class="btn-save" onclick="saveEvent()">Зберегти в хмару</button>
    <button style="background:none; border:none; color:#c92a2a; width:100%; margin-top:12px; cursor:pointer; font-size:13px;" onclick="deleteEvent()">Видалити</button>
    <button style="background:none; border:none; color:#868e96; width:100%; margin-top:8px; cursor:pointer; font-size:13px;" onclick="closeAll()">Скасувати</button>
</div>

  import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
