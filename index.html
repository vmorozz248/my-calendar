<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кабінет Валерії 🦝</title>
<style>
    :root {
        --bg-main: #f3e8ff; --border-color: #888; 
        --header-gradient: linear-gradient(135deg, #6c429c, #d93d5c);
        --clr-марафон: #2f9e44; --clr-акція: #1971c2; --clr-фотозвіт_до_свята: #d6336c;
        --clr-профорієнтація: #e67700; --clr-фотозвіт_до_дати: #862e9c; --clr-фотозвіт: #495057;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); margin: 0; padding: 0; color: #212529; min-height: 100vh; }
    .header { width: 100%; background: var(--header-gradient); padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; z-index: 100; }
    .header-controls { display: flex; gap: 12px; align-items: center; }
    .main-container { display: flex; flex-direction: row; gap: 20px; padding: 20px; max-width: 1450px; margin: 0 auto; box-sizing: border-box; align-items: flex-start; }
    .calendar-section { flex: 1; background: white; border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 650px; }
    .stats-panel { width: 340px; background: white; border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto; }
    @media (max-width: 900px) { .main-container { flex-direction: column; padding: 10px; } .stats-panel { width: 100%; order: 2; } .calendar-section { order: 1; width: 100%; min-height: auto; } }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border-color); border-left: 1px solid var(--border-color); background: white; }
    .week-day { background: #f1f3f5; padding: 15px; text-align: center; font-weight: bold; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
    .day { height: 135px; padding: 10px; cursor: pointer; background: #fff; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); position: relative; overflow-y: auto; }
    .day:hover { background: #fdfaff; }
    .day.highlight-профорієнтація { background: #fff4e6 !important; border: 2px solid var(--clr-профорієнтація) !important; }
    .day.highlight-марафон { background: #e6ffed !important; border: 2px solid var(--clr-марафон) !important; }
    .day.highlight-акція { background: #e7f5ff !important; border: 2px solid var(--clr-акція) !important; }
    .day.highlight-фотозвіт_до_свята { background: #fff0f6 !important; border: 2px solid var(--clr-фотозвіт_до_свята) !important; }
    .day.highlight-фотозвіт_до_дати { background: #f8f0fc !important; border: 2px solid var(--clr-фотозвіт_до_дати) !important; }
    .day.highlight-фотозвіт { background: #f8f9fa !important; border: 2px solid var(--clr-фотозвіт) !important; }
    .date-num { font-size: 18px; font-weight: bold; margin-bottom: 8px; display: block; }
    .ev-badge { font-size: 11px; padding: 3px 5px; border-radius: 4px; margin-bottom: 3px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-weight: 500; }
    #eventForm, #reportModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 60px rgba(0,0,0,0.4); z-index: 3000; width: 95%; max-width: 500px; display: none; max-height: 88vh; overflow-y: auto; border: 1px solid var(--border-color); }
    .event-block { border: 1px solid #ccc; padding: 18px; border-radius: 12px; margin-bottom: 20px; position: relative; background: #f9f9f9; }
    .btn-add { background: #2f9e44; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    .btn-save { background: #6c429c; color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; }
    input, select, textarea { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #bbb; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
    .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; z-index: 2500; backdrop-filter: blur(3px); }
    .is-holiday { background: #fff9db !important; }
    .stat-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; border-left: 6px solid transparent; background: #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.08); }
    .stat-item.active { background: #eee !important; font-weight: bold; }
    .cat-марафон { background: var(--clr-марафон); } .cat-акція { background: var(--clr-акція); } .cat-фотозвіт_до_свята { background: var(--clr-фотозвіт_до_свята); }
    .cat-профорієнтація { background: var(--clr-профорієнтація); } .cat-фотозвіт_до_дати { background: var(--clr-фотозвіт_до_дати); } .cat-фотозвіт { background: var(--clr-фотозвіт); }
    .prof-fields { display: none; background: #fff4e6; padding: 10px; border-radius: 8px; border: 1px dashed var(--clr-профорієнтація); margin-top: 5px; }
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeAll()"></div>
<div class="header">
    <div class="header-text">
        <h2 style="margin:0;">Кабінет Валерії 🦝</h2>
        <p style="margin:4px 0 0 0; font-size:14px; opacity:0.9;">Робота з навчальними закладами</p>
    </div>
    <div class="header-controls">
        <button onclick="goToday()" style="background:#fff; color:#6c429c; border:none; padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:bold;">Сьогодні</button>
        <input type="text" id="searchInp" placeholder="Пошук..." oninput="render()" style="width:140px; border:none; padding:10px; border-radius:10px;">
        <button onclick="generateReport()" style="background:#fff; color:#6c429c; border:none; padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:bold;">Звіт</button>
    </div>
</div>

<div class="main-container">
    <div class="calendar-section">
        <div style="display:flex; justify-content:center; align-items:center; gap:40px; margin-bottom:25px;">
            <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:30px; color:#6c429c; cursor:pointer;">❮</button>
            <div id="monthTitle" style="font-size:26px; font-weight:bold; min-width:200px; text-align:center;"></div>
            <button onclick="changeMonth(1)" style="border:none; background:none; font-size:30px; color:#6c429c; cursor:pointer;">❯</button>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>
    <div class="stats-panel">
        <div style="font-weight:bold; color:#6c429c; margin-bottom:18px; border-bottom:2px solid #f3e8ff; padding-bottom:8px;">📊 Статистика</div>
        <div id="statsContent"></div>
    </div>
</div>

<div id="eventForm">
    <h3 id="selectedDateText" style="text-align:center; color:#6c429c; margin-top:0;"></h3>
    <div style="text-align:center; margin-bottom:15px;"><label style="cursor: pointer;"><input type="checkbox" id="isHoliday" style="width:auto; transform: scale(1.2);"> Вихідний / Свято</label></div>
    <div id="eventList"></div>
    <button class="btn-add" onclick="addNewEventBlock()">+ Додати захід</button>
    <button class="btn-save" onclick="saveAllEvents()">Зберегти все</button>
</div>

<div
