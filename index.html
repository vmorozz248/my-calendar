<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кабінет Валерії 🦝</title>
<style>
    :root {
        --bg-main: #f3e8ff; 
        --border-color: #888; 
        --header-gradient: linear-gradient(135deg, #6c429c, #d93d5c);
        --sat-color: #e03131; --sun-color: #7048e8;
        --clr-марафон: #2f9e44; --clr-акція: #1971c2; --clr-фотозвіт_до_свята: #d6336c;
        --clr-профорієнтація: #e67700; --clr-фотозвіт_до_дати: #862e9c; --clr-фотозвіт: #495057;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); margin: 0; padding: 0; color: #212529; }
    
    /* ВИПРАВЛЕНО: Гнучка структура для ПК та Телефону */
    .main-container { 
        display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; box-sizing: border-box;
    }

    .calendar-section { flex: 1; min-width: 320px; background: white; border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .stats-panel { width: 300px; background: white; border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); height: fit-content; }

    /* ЖОРСТКИЙ МОБІЛЬНИЙ РЕЖИМ */
    @media (max-width: 900px) {
        .main-container { flex-direction: column; padding: 10px; }
        .stats-panel { width: 100%; box-sizing: border-box; }
        .header { flex-direction: column; height: auto !important; padding: 15px 10px; }
        .header-controls { width: 100%; justify-content: space-around; margin-top: 10px; gap: 5px; }
        .header-controls button, .header-controls input { font-size: 11px; padding: 6px 8px; }
        .day { height: 75px !important; }
        .week-day { font-size: 10px; padding: 5px 2px; }
    }

    .header { width: 100%; background: var(--header-gradient); padding: 12px 20px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-radius: 0 0 15px 15px; }
    .header-controls { display: flex; gap: 8px; align-items: center; }
    
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
    .month-title { font-size: 18px; font-weight: bold; min-width: 140px; text-align: center; }
    
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border-color); border-left: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
    .week-day { background: #f1f3f5; padding: 8px; text-align: center; font-weight: bold; font-size: 11px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
    .day { height: 100px; padding: 4px; cursor: pointer; background: #fff; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); position: relative; }
    .is-weekend { background: #fafafa; } .is-holiday { background: #fff9db !important; }
    
    .ev-badge { font-size: 8px; padding: 2px; border-radius: 3px; margin-top: 2px; color: white; line-height: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: block; }
    
    .cat-марафон { background: var(--clr-марафон); } .cat-акція { background: var(--clr-акція); } .cat-фотозвіт_до_свята { background: var(--clr-фотозвіт_до_свята); }
    .cat-профорієнтація { background: var(--clr-профорієнтація); } .cat-фотозвіт_до_дати { background: var(--clr-фотозвіт_до_дати); } .cat-фотозвіт { background: var(--clr-фотозвіт); }

    .stat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .stat-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }

    #eventForm, #reportModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.3); z-index: 1000; width: 92%; max-width: 380px; display: none; border: 1px solid var(--border-color); box-sizing: border-box; }
    input, textarea, select { width: 100%; margin: 5px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .btn-save { background: #6c429c; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:999; backdrop-filter: blur(2px); }
</style>
</head>
<body>

<div class="header">
    <div class="header-text">
        <h2 style="margin:0; font-size:16px;">Кабінет Валерії 🦝</h2>
        <p style="margin:2px 0 0 0; font-size:10px; opacity:0.8">2025-2026 н.р. • Хмара</p>
    </div>
    <div class="header-controls">
        <button onclick="goToday()" style="background:#fff; color:#6c429c; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:bold;">Сьогодні</button>
        <input type="text" id="searchInp" placeholder="Пошук..." oninput="render()" style="width:80px; border:none; border-radius:6px; padding:6px;">
        <button onclick="generateReport()" style="background:#fff; color:#6c429c; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:bold;">Звіт</button>
    </div>
</div>

<div class="main-container">
    <div class="calendar-section">
        <div class="month-nav">
            <button onclick="changeMonth(-1)" style="cursor:pointer; border:none; background:none; font-size:20px; color:#6c429c">❮</button>
            <div class="month-title" id="monthTitle"></div>
            <button onclick="changeMonth(1)" style="cursor:pointer; border:none; background:none; font-size:20px; color:#6c429c">❯</button>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="stats-panel">
        <div style="font-weight:bold; color:#6c429c; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">📊 Статистика</div>
        <div id="statsContent"></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="eventForm">
    <h3 id="selectedDateText" style="margin:0 0 10px 0; color:#6c429c; text-align:center; font-size:18px;"></h3>
    <div style="font-size:12px; margin-bottom:10px; text-align:center;"><input type="checkbox" id="isHoliday" style="width:auto"> Вихідний/Свято</div>
    <select id="eventCategory">
        <option value="акція">Акція</option><option value="марафон">Марафон</option>
        <option value="фотозвіт_до_свята">Фотозвіт до свята</option><option value="профорієнтація">Профорієнтація</option>
        <option value="фотозвіт_до_дати">Фотозвіт до дати</option><option value="фотозвіт">Фотозвіт</option>
    </select>
    <input type="text" id="eventName" placeholder="Назва заходу">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <input type="text" id="eventClass" placeholder="Клас">
        <input type="text" id="eventTeacher" placeholder="Вчитель">
    </div>
    <input type="text" id="eventStudent" placeholder="ПІБ учня">
    <textarea id="eventDetails" placeholder="Примітки" rows="2"></textarea>
    <button class="btn-save" onclick="saveEvent()">Зберегти</button>
    <button style="background:none; border:none; color:#c92a2a; width:100%; margin-top:10px; cursor:pointer; font-size:12px;" onclick="deleteEvent()">Видалити</button>
    <button style="background:none; border:none; color:#868e96; width:100%; margin-top:5px; cursor:pointer; font-size:12px;" onclick="closeAll()">Скасувати</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjwzw-TF0zcrfFL6vfcTfGyeCO_UaoHxw",
    authDomain: "valeria-calendar.firebaseapp.com",
    projectId: "valeria-calendar",
    storageBucket: "valeria-calendar.firebasestorage.app",
    messagingSenderId: "294992605627",
    appId: "1:294992605627:web:82a06b96a1ebf5b020d49e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let d = new Date();
  let currMonth = d.getMonth();
  let currYear = d.getFullYear();
  let events = {};
  const months = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

  onSnapshot(collection(db, "schoolEvents"), (snapshot) => {
    events = {}; snapshot.forEach(doc => { events[doc.id] = doc.data(); }); render();
  });

  window.saveEvent = async function() {
    const data = {
        name: document.getElementById('eventName').value,
        cls: document.getElementById('eventClass').value,
        teacher: document.getElementById('eventTeacher').value,
        student: document.getElementById('eventStudent').value,
        det: document.getElementById('eventDetails').value,
        category: document.getElementById('eventCategory').value,
        isHoliday: document.getElementById('isHoliday').checked
    };
    await setDoc(doc(db, "schoolEvents", window.selKey), data); closeAll();
  };

  window.deleteEvent = async function() {
    if(confirm("Видалити?")) { await deleteDoc(doc(db, "schoolEvents", window.selKey)); closeAll(); }
  };

  window.render = function() {
    const grid = document.getElementById('daysGrid');
    const query = (document.getElementById('searchInp').value || "").toLowerCase();
    document.getElementById('monthTitle').innerText = `${months[currMonth]} ${currYear}`;
    grid.innerHTML = '';
    ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"].forEach(wd => { grid.innerHTML += `<div class="week-day">${wd}</div>`; });

    let firstDay = new Date(currYear, currMonth, 1).getDay();
    let daysInMo = new Date(currYear, currMonth + 1, 0).getDate();
    let start = firstDay === 0 ? 6 : firstDay - 1;
    let stats = {};

    for(let p=0; p<start; p++) grid.innerHTML += `<div class="day empty-day"></div>`;
    for (let i = 1; i <= daysInMo; i++) {
        const key = `${currYear}-${currMonth}-${i}`;
        const dayDiv = document.createElement('div');
        const dw = new Date(currYear, currMonth, i).getDay();
        dayDiv.className = `day ${dw===0 || dw===6 ? 'is-weekend' : ''}`;
        if (events[key] && events[key].isHoliday) dayDiv.classList.add('is-holiday');
        let html = `<span class="date-num" style="font-size:12px;">${i}</span>`;
        if (events[key]) {
            const ev = events[key];
            const matches = ev.name?.toLowerCase().includes(query) || ev.cls?.toLowerCase().includes(query) || ev.student?.toLowerCase().includes(query);
            if (matches) {
                const label = ev.cls ? ev.cls : (ev.student ? ev.student : ev.name);
                html += `<div class="ev-badge cat-${ev.category}">${label}</div>`;
                stats[ev.category] = (stats[ev.category] || 0) + 1;
            }
        }
        dayDiv.innerHTML = html; dayDiv.onclick = () => openForm(i); grid.appendChild(dayDiv);
    }
    let h = '';
    for (let cat in stats) {
        const label = cat.charAt(0).toUpperCase() + cat.slice(1).replace(/_/g, ' ');
        h += `<div class="stat-row"><span><span class="stat-dot" style="background:var(--clr-${cat})"></span>${label}</span><b>${stats[cat]}</b></div>`;
    }
    document.getElementById('statsContent').innerHTML = h || '<p style="font-size:12px;color:#999">Заходів немає</p>';
  };

  window.openForm = function(day) {
    window.selKey = `${currYear}-${currMonth}-${day}`;
    document.getElementById('selectedDateText').innerText = `${day} ${months[currMonth]}`;
    document.getElementById('eventForm').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    let data = events[window.selKey] || {name:'', cls:'', teacher:'', student:'', det:'', category:'акція', isHoliday:false};
    document.getElementById('eventName').value = data.name || '';
    document.getElementById('eventClass').value = data.cls || '';
    document.getElementById('eventTeacher').value = data.teacher || '';
    document.getElementById('eventStudent').value = data.student || '';
    document.getElementById('eventDetails').value = data.det || '';
    document.getElementById('eventCategory').value = data.category;
    document.getElementById('isHoliday').checked = data.isHoliday;
  };

  window.goToday = function() { let now = new Date(); currMonth = now.getMonth(); currYear = now.getFullYear(); render(); };
  window.changeMonth = function(s) { currMonth += s; if (currMonth < 0) { currMonth = 11; currYear--; } if (currMonth > 11) { currMonth = 0; currYear++; } render(); };
  window.closeAll = function() { document.getElementById('eventForm').style.display='none'; document.getElementById('overlay').style.display='none'; };
  render();
</script>
</body>
</html>
