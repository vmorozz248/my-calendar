<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кабінет Валерії 🦝</title>
<style>
    :root {
        --bg-main: #f3e8ff; --border-color: #888; 
        --header-gradient: linear-gradient(135deg, #6c429c, #d93d5c);
        --clr-марафон: #2f9e44; --clr-акція: #1971c2; --clr-фотозвіт_до_свята: #d6336c;
        --clr-профорієнтація: #e67700; --clr-фотозвіт_до_дати: #862e9c; --clr-фотозвіт: #495057;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); margin: 0; padding: 0; color: #212529; min-height: 100vh; }
    
    .header { width: 100%; background: var(--header-gradient); padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; z-index: 100; }
    .header-controls { display: flex; gap: 12px; align-items: center; }

    .main-container { display: flex; flex-direction: row; gap: 20px; padding: 20px; max-width: 1450px; margin: 0 auto; box-sizing: border-box; align-items: flex-start; }
    
    .calendar-section { flex: 1; background: white; border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 650px; }
    .stats-panel { width: 340px; background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto; }

    @media (max-width: 900px) { .main-container { flex-direction: column; padding: 10px; } .stats-panel { width: 100%; order: 2; } .calendar-section { order: 1; width: 100%; min-height: auto; } .header { flex-direction: column; gap: 12px; text-align: center; } }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border-color); border-left: 1px solid var(--border-color); background: white; }
    .week-day { background: #f1f3f5; padding: 15px; text-align: center; font-weight: bold; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-size: 16px; }
    
    .day { height: 135px; padding: 10px; cursor: pointer; background: #fff; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); position: relative; transition: 0.2s; box-sizing: border-box; overflow: hidden; }
    .day:hover { background: #fdfaff; }
    
    /* ДИНАМІЧНЕ ПІДСВІЧУВАННЯ */
    .day.highlight-марафон { background: #e6ffed !important; border: 2px solid var(--clr-марафон) !important; box-shadow: inset 0 0 10px rgba(47, 158, 68, 0.3); }
    .day.highlight-акція { background: #e7f5ff !important; border: 2px solid var(--clr-акція) !important; box-shadow: inset 0 0 10px rgba(25, 113, 194, 0.3); }
    .day.highlight-фотозвіт_до_свята { background: #fff0f6 !important; border: 2px solid var(--clr-фотозвіт_до_свята) !important; box-shadow: inset 0 0 10px rgba(214, 51, 108, 0.3); }
    .day.highlight-профорієнтація { background: #fff4e6 !important; border: 2px solid var(--clr-профорієнтація) !important; box-shadow: inset 0 0 10px rgba(230, 119, 0, 0.3); }
    .day.highlight-фотозвіт_до_дати { background: #f8f0fc !important; border: 2px solid var(--clr-фотозвіт_до_дати) !important; box-shadow: inset 0 0 10px rgba(134, 46, 156, 0.3); }
    .day.highlight-фотозвіт { background: #f8f9fa !important; border: 2px solid var(--clr-фотозвіт) !important; box-shadow: inset 0 0 10px rgba(73, 80, 87, 0.3); }

    .date-num { font-size: 18px; font-weight: bold; margin-bottom: 8px; display: block; color: #333; }
    .ev-badge { font-size: 11px; padding: 3px 5px; border-radius: 4px; margin-bottom: 3px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; line-height: 1.3; font-weight: 500; }

    #eventForm, #reportModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 60px rgba(0,0,0,0.4); z-index: 3000; width: 95%; max-width: 500px; display: none; max-height: 88vh; overflow-y: auto; border: 1px solid var(--border-color); }
    .event-block { border: 1px solid #ccc; padding: 18px; border-radius: 12px; margin-bottom: 20px; position: relative; background: #f9f9f9; }
    
    .btn-add { background: #2f9e44; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 15px; }
    .btn-save { background: #6c429c; color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; }
    
    input, select, textarea { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #bbb; border-radius: 10px; box-sizing: border-box; font-size: 15px; color: #333; }
    .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; z-index: 2500; backdrop-filter: blur(3px); }

    .is-weekend { background: #fafafa; } .is-holiday { background: #fff9db !important; }
    
    /* СТИЛІ ДЛЯ СТАТИСТИКИ */
    .stat-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; border-left: 6px solid transparent; background: #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.08); transition: 0.2s; }
    .stat-item:hover { transform: translateX(5px); }
    .stat-item.active { background: #eee !important; color: #000 !important; font-weight: bold; }
    
    .cat-марафон { background: var(--clr-марафон); border-color: var(--clr-марафон); } 
    .cat-акція { background: var(--clr-акція); border-color: var(--clr-акція); } 
    .cat-фотозвіт_до_свята { background: var(--clr-фотозвіт_до_свята); border-color: var(--clr-фотозвіт_до_свята); }
    .cat-профорієнтація { background: var(--clr-профорієнтація); border-color: var(--clr-профорієнтація); } 
    .cat-фотозвіт_до_дати { background: var(--clr-фотозвіт_до_дати); border-color: var(--clr-фотозвіт_до_дати); } 
    .cat-фотозвіт { background: var(--clr-фотозвіт); border-color: var(--clr-фотозвіт); }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="header">
    <div class="header-text">
        <h2 style="margin:0; font-size:24px;">Кабінет Валерії 🦝</h2>
        <p style="margin:4px 0 0 0; font-size:14px; opacity:0.9; font-weight: 500;">2025-2026 навчальний рік • Розумна палітра</p>
    </div>
    <div class="header-controls">
        <button onclick="goToday()" style="background:#fff; color:#6c429c; border:none; padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:bold; font-size: 15px;">Сьогодні</button>
        <input type="text" id="searchInp" placeholder="Пошук..." oninput="render()" style="width:140px; border-radius:10px; border:none; padding:10px;">
        <button onclick="generateReport()" style="background:#fff; color:#6c429c; border:none; padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:bold; font-size: 15px;">Звіт</button>
    </div>
</div>

<div class="main-container">
    <div class="calendar-section">
        <div style="display:flex; justify-content:center; align-items:center; gap:40px; margin-bottom:25px;">
            <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:30px; color:#6c429c; cursor:pointer;">❮</button>
            <div id="monthTitle" style="font-size:26px; font-weight:bold; min-width:200px; text-align:center;"></div>
            <button onclick="changeMonth(1)" style="border:none; background:none; font-size:30px; color:#6c429c; cursor:pointer;">❯</button>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>
    <div class="stats-panel">
        <div style="font-weight:bold; color:#6c429c; margin-bottom:18px; border-bottom:2px solid #f3e8ff; padding-bottom:8px; font-size: 18px;">🎨 Категорії (клік для підсвітки)</div>
        <div id="statsContent"></div>
    </div>
</div>

<div id="eventForm">
    <h3 id="selectedDateText" style="text-align:center; color:#6c429c; margin-top:0; font-size: 24px;"></h3>
    <div style="text-align:center; margin-bottom:20px; font-size: 16px;"><label style="cursor: pointer;"><input type="checkbox" id="isHoliday" style="width:auto; transform: scale(1.3); margin-right: 8px;"> Святковий день / Вихідний</label></div>
    <div id="eventList"></div>
    <button class="btn-add" onclick="addNewEventBlock()">+ Додати ще захід</button>
    <button class="btn-save" onclick="saveAllEvents()">Зберегти зміни</button>
    <button style="width:100%; background:none; border:none; color:#888; margin-top:15px; cursor:pointer; font-size:14px; text-decoration: underline;" onclick="closeAll()">Скасувати</button>
</div>

<div id="reportModal">
    <h3 style="margin-top:0; color:#6c429c;">Звіт за місяць</h3>
    <textarea id="reportTextarea" style="height:350px; font-family:monospace; font-size:14px; width:100%; padding:15px; border:1px solid #ccc; border-radius:12px;" readonly></textarea>
    <button class="btn-save" style="margin-top:20px;" onclick="closeAll()">Закрити</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyAjwzw-TF0zcrfFL6vfcTfGyeCO_UaoHxw", authDomain: "valeria-calendar.firebaseapp.com", projectId: "valeria-calendar", storageBucket: "valeria-calendar.firebasestorage.app", messagingSenderId: "294992605627", appId: "1:294992605627:web:82a06b96a1ebf5b020d49e" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let d = new Date(), currMonth = d.getMonth(), currYear = d.getFullYear(), events = {}, highlightedCat = null;
  const months = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

  onSnapshot(collection(db, "schoolEvents"), (snapshot) => {
    events = {}; snapshot.forEach(doc => { events[doc.id] = doc.data(); }); render();
  });

  window.render = function() {
    const grid = document.getElementById('daysGrid');
    const query = (document.getElementById('searchInp').value || "").toLowerCase();
    document.getElementById('monthTitle').innerText = `${months[currMonth]} ${currYear}`;
    grid.innerHTML = '';
    ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"].forEach(wd => { grid.innerHTML += `<div class="week-day">${wd}</div>`; });

    let firstDay = new Date(currYear, currMonth, 1).getDay();
    let daysInMo = new Date(currYear, currMonth + 1, 0).getDate();
    let start = firstDay === 0 ? 6 : firstDay - 1;
    let statsData = {};

    for(let p=0; p<start; p++) grid.innerHTML += `<div class="day empty-day"></div>`;
    for (let i = 1; i <= daysInMo; i++) {
        const key = `${currYear}-${currMonth}-${i}`, dayDiv = document.createElement('div'), dw = new Date(currYear, currMonth, i).getDay();
        dayDiv.className = `day ${dw===0 || dw===6 ? 'is-weekend' : ''}`;
        let html = `<span class="date-num">${i}</span>`;
        
        if (events[key]) {
            if (events[key].isHoliday) dayDiv.classList.add('is-holiday');
            const items = events[key].items || [];
            items.forEach(ev => {
                if (ev.name.toLowerCase().includes(query) || (ev.cls && ev.cls.toLowerCase().includes(query))) {
                    if (highlightedCat && ev.category === highlightedCat) dayDiv.classList.add(`highlight-${ev.category}`);
                    html += `<div class="ev-badge cat-${ev.category}">${ev.cls ? ev.cls + ': ' : ''}${ev.name}</div>`;
                    if (!statsData[ev.category]) statsData[ev.category] = { count: 0, names: new Set() };
                    statsData[ev.category].count++;
                    statsData[ev.category].names.add(ev.name);
                }
            });
        }
        dayDiv.innerHTML = html; dayDiv.onclick = () => openForm(i); grid.appendChild(dayDiv);
    }

    let h = '';
    for (let cat in statsData) {
        const isActive = highlightedCat === cat ? 'active' : '';
        const label = cat.charAt(0).toUpperCase() + cat.slice(1).replace(/_/g, ' ');
        h += `<div class="stat-item ${isActive}" style="border-left-color: var(--clr-${cat})" onclick="window.toggleH('${cat}')">
            <div style="display:flex; justify-content:space-between;">
                <b style="color: var(--clr-${cat})">${label}</b>
                <span>${statsData[cat].count}</span>
            </div>
            <div style="font-size:11px; color:#666; margin-top:5px;">${Array.from(statsData[cat].names).slice(0, 3).join(', ')}${statsData[cat].names.size > 3 ? '...' : ''}</div>
        </div>`;
    }
    document.getElementById('statsContent').innerHTML = h || '<p style="color:#999;text-align:center;">Подій немає</p>';
  };

  window.toggleH = (c) => { highlightedCat = highlightedCat === c ? null : c; render(); };

  window.openForm = function(day) {
    window.selKey = `${currYear}-${currMonth}-${day}`;
    document.getElementById('selectedDateText').innerText = `${day} ${months[currMonth]}`;
    const data = events[window.selKey] || { items: [], isHoliday: false };
    document.getElementById('isHoliday').checked = data.isHoliday;
    document.getElementById('eventList').innerHTML = '';
    if (data.items.length === 0) addNewEventBlock();
    else data.items.forEach(ev => addNewEventBlock(ev));
    document.getElementById('eventForm').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
  };

  window.addNewEventBlock = function(val = {}) {
    const div = document.createElement('div'); div.className = 'event-block';
    div.innerHTML = `
        <button onclick="this.parentElement.remove()" style="position:absolute;right:12px;top:12px;color:red;border:none;background:none;cursor:pointer;font-size:18px;">✕</button>
        <select class="ev-cat">
            <option value="акція" ${val.category==='акція'?'selected':''}>Акція</option>
            <option value="марафон" ${val.category==='марафон'?'selected':''}>Марафон</option>
            <option value="фотозвіт_до_свята" ${val.category==='фотозвіт_до_свята'?'selected':''}>Фотозвіт до свята</option>
            <option value="фотозвіт" ${val.category==='фотозвіт'?'selected':''}>Фотозвіт</option>
            <option value="профорієнтація" ${val.category==='профорієнтація'?'selected':''}>Профорієнтація</option>
            <option value="фотозвіт_до_дати" ${val.category==='фотозвіт_до_дати'?'selected':''}>Фотозвіт до дати</option>
        </select>
        <input type="text" class="ev-name" placeholder="Назва заходу" value="${val.name||''}">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <input type="text" class="ev-cls" placeholder="Клас" value="${val.cls||''}">
            <input type="text" class="ev-teacher" placeholder="Вчитель" value="${val.teacher||''}">
        </div>
        <input type="text" class="ev-student" placeholder="ПІБ учня" value="${val.student||''}">
        <textarea class="ev-det" placeholder="Примітки" rows="2">${val.det||''}</textarea>
    `;
    document.getElementById('eventList').appendChild(div);
  };

  window.saveAllEvents = async function() {
    const blocks = document.querySelectorAll('.event-block');
    const items = [];
    blocks.forEach(b => {
        const n = b.querySelector('.ev-name').value;
        if (n) items.push({ category: b.querySelector('.ev-cat').value, name: n, cls: b.querySelector('.ev-cls').value, teacher: b.querySelector('.ev-teacher').value, student: b.querySelector('.ev-student').value, det: b.querySelector('.ev-det').value });
    });
    await setDoc(doc(db, "schoolEvents", window.selKey), { items: items, isHoliday: document.getElementById('isHoliday').checked });
    closeAll();
  };

  window.generateReport = function() {
    let r = `ЗВІТ ЗА ${months[currMonth].toUpperCase()} ${currYear}\n\n`;
    for(let i=1; i<=31; i++){
        const k = `${currYear}-${currMonth}-${i}`;
        if(events[k] && events[k].items && events[k].items.length > 0) {
            r += `${i} ${months[currMonth]}:\n`;
            events[k].items.forEach((ev, idx) => { r += `  ${idx+1}. [${ev.category.toUpperCase()}] ${ev.name} (Кл: ${ev.cls || '-'})\n`; });
            r += `--------------------------\n`;
        }
    }
    document.getElementById('reportTextarea').value = r; document.getElementById('reportModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block';
  };

  window.goToday = () => { let n = new Date(); currMonth = n.getMonth(); currYear = n.getFullYear(); render(); };
  window.changeMonth = (s) => { currMonth += s; if(currMonth<0){currMonth=11;currYear--;} if(currMonth>11){currMonth=0;currYear++;} render(); };
  window.closeAll = () => { document.getElementById('eventForm').style.display='none'; document.getElementById('reportModal').style.display='none'; document.getElementById('overlay').style.display='none'; };
  render();
</script>
</body>
</html>
