<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кабінет Валерії 🦝</title>
<style>
    :root {
        --bg-main: #f3e8ff; 
        --border-color: #888; 
        --header-gradient: linear-gradient(135deg, #6c429c, #d93d5c);
        --sat-color: #e03131; --sun-color: #7048e8;
        --clr-марафон: #2f9e44; --clr-акція: #1971c2; --clr-фотозвіт_до_свята: #d6336c;
        --clr-профорієнтація: #e67700; --clr-фотозвіт_до_дати: #862e9c; --clr-фотозвіт: #495057;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); margin: 0; padding: 0; color: #212529; min-height: 100vh; }
    
    .header { width: 100%; background: var(--header-gradient); padding: 12px 25px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; z-index: 10; }
    .header-controls { display: flex; gap: 10px; align-items: center; }

    .main-container { display: flex; flex-direction: row; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; box-sizing: border-box; align-items: flex-start; }

    .calendar-section { flex: 1; background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .stats-panel { width: 320px; background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); height: fit-content; max-height: 80vh; overflow-y: auto; }

    @media (max-width: 900px) {
        .main-container { flex-direction: column; padding: 10px; }
        .stats-panel { width: 100%; }
        .header { flex-direction: column; padding: 15px 10px; text-align: center; gap: 10px; }
        .day { height: 85px !important; }
    }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border-color); border-left: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; background: white; }
    .week-day { background: #f1f3f5; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
    
    .day { height: 110px; padding: 10px; cursor: pointer; background: #fff; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); position: relative; box-sizing: border-box; transition: 0.3s; }
    .day.highlighted { transform: scale(0.95); box-shadow: inset 0 0 15px rgba(108, 66, 156, 0.4); border: 2px solid #6c429c; z-index: 5; }

    .date-num { font-size: 16px; font-weight: bold; }
    .ev-badge { font-size: 11px; padding: 3px 5px; border-radius: 4px; margin-top: 4px; color: white; line-height: 1.2; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Стиль для кнопок у статистиці */
    .stat-item { padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; margin-bottom: 5px; }
    .stat-item:hover { background: #f3e8ff; border-color: #6c429c; }
    .stat-item.active { background: #6c429c !important; color: white !important; font-weight: bold; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }

    #eventForm { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.3); z-index: 2000; width: 92%; max-width: 400px; display: none; border: 1px solid var(--border-color); box-sizing: border-box; max-height: 85vh; overflow-y: auto; }
    input, select, textarea { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; resize: none; }
    .btn-save { background: #6c429c; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:1500; backdrop-filter: blur(2px); }
    
    .is-weekend { background: #fafafa; } .is-holiday { background: #fff9db !important; }
    .cat-марафон { background: var(--clr-марафон); } .cat-акція { background: var(--clr-акція); } .cat-фотозвіт_до_свята { background: var(--clr-фотозвіт_до_свята); }
    .cat-профорієнтація { background: var(--clr-профорієнтація); } .cat-фотозвіт_до_дати { background: var(--clr-фотозвіт_до_дати); } .cat-фотозвіт { background: var(--clr-фотозвіт); }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="header">
    <div class="header-text">
        <h2 style="margin:0; font-size:20px;">Кабінет Валерії 🦝</h2>
        <p style="margin:2px 0 0 0; font-size:12px; opacity:0.8">2025-2026 н.р. • Розумна статистика</p>
    </div>
    <div class="header-controls">
        <button onclick="goToday()" style="background:#fff; color:#6c429c; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:13px;">Сьогодні</button>
        <input type="text" id="searchInp" placeholder="Пошук..." oninput="render()" style="width:120px; border:none; border-radius:8px; padding:8px;">
        <button onclick="generateReport()" style="background:#fff; color:#6c429c; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:13px;">Звіт</button>
    </div>
</div>

<div class="main-container">
    <div class="calendar-section">
        <div class="month-nav" style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:15px;">
            <button onclick="changeMonth(-1)" style="cursor:pointer; border:none; background:none; font-size:24px; color:#6c429c">❮</button>
            <div id="monthTitle" style="font-size:20px; font-weight:bold; min-width:160px; text-align:center;"></div>
            <button onclick="changeMonth(1)" style="cursor:pointer; border:none; background:none; font-size:24px; color:#6c429c">❯</button>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="stats-panel">
        <div style="font-weight:bold; color:#6c429c; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:5px;">📊 Заходи місяця</div>
        <div id="statsContent"></div>
    </div>
</div>

<div id="eventForm">
    <h3 id="selectedDateText" style="margin:0 0 15px 0; color:#6c429c; text-align:center;"></h3>
    <div style="font-size:14px; margin-bottom:12px; text-align:center;"><input type="checkbox" id="isHoliday" style="width:auto"> Вихідний/Свято</div>
    <select id="eventCategory">
        <option value="акція">Акція</option><option value="марафон">Марафон</option>
        <option value="фотозвіт_до_свята">Фотозвіт до свята</option><option value="профорієнтація">Профорієнтація</option>
        <option value="фотозвіт_до_дати">Фотозвіт до дати</option><option value="фотозвіт">Фотозвіт</option>
    </select>
    <input type="text" id="eventName" placeholder="Назва заходу (напр. День Миру)">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <input type="text" id="eventClass" placeholder="Клас">
        <input type="text" id="eventTeacher" placeholder="Вчитель">
    </div>
    <input type="text" id="eventStudent" placeholder="ПІБ учня">
    <textarea id="eventDetails" placeholder="Примітки" rows="4"></textarea>
    <button class="btn-save" onclick="saveEvent()">Зберегти</button>
    <button style="background:none; border:none; color:#c92a2a; width:100%; margin-top:12px; cursor:pointer; font-size:12px;" onclick="deleteEvent()">Видалити</button>
    <button style="background:none; border:none; color:#868e96; width:100%; margin-top:8px; cursor:pointer; font-size:12px;" onclick="closeAll()">Скасувати</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjwzw-TF0zcrfFL6vfcTfGyeCO_UaoHxw",
    authDomain: "valeria-calendar.firebaseapp.com",
    projectId: "valeria-calendar",
    storageBucket: "valeria-calendar.firebasestorage.app",
    messagingSenderId: "294992605627",
    appId: "1:294992605627:web:82a06b96a1ebf5b020d49e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let d = new Date();
  let currMonth = d.getMonth();
  let currYear = d.getFullYear();
  let events = {};
  let highlightedEventName = null;

  const months = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

  onSnapshot(collection(db, "schoolEvents"), (snapshot) => {
    events = {}; snapshot.forEach(doc => { events[doc.id] = doc.data(); }); render();
  });

  window.saveEvent = async function() {
    const data = {
        name: document.getElementById('eventName').value,
        cls: document.getElementById('eventClass').value,
        teacher: document.getElementById('eventTeacher').value,
        student: document.getElementById('eventStudent').value,
        det: document.getElementById('eventDetails').value,
        category: document.getElementById('eventCategory').value,
        isHoliday: document.getElementById('isHoliday').checked
    };
    await setDoc(doc(db, "schoolEvents", window.selKey), data); closeAll();
  };

  window.deleteEvent = async function() {
    if(confirm("Видалити?")) { await deleteDoc(doc(db, "schoolEvents", window.selKey)); closeAll(); }
  };

  window.render = function() {
    const grid = document.getElementById('daysGrid');
    const query = (document.getElementById('searchInp').value || "").toLowerCase();
    document.getElementById('monthTitle').innerText = `${months[currMonth]} ${currYear}`;
    grid.innerHTML = '';
    ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"].forEach(wd => { grid.innerHTML += `<div class="week-day">${wd}</div>`; });

    let firstDay = new Date(currYear, currMonth, 1).getDay();
    let daysInMo = new Date(currYear, currMonth + 1, 0).getDate();
    let start = firstDay === 0 ? 6 : firstDay - 1;
    let statsData = {};

    for(let p=0; p<start; p++) grid.innerHTML += `<div class="day empty-day"></div>`;
    for (let i = 1; i <= daysInMo; i++) {
        const key = `${currYear}-${currMonth}-${i}`;
        const dayDiv = document.createElement('div');
        const dw = new Date(currYear, currMonth, i).getDay();
        dayDiv.className = `day ${dw===0 || dw===6 ? 'is-weekend' : ''}`;
        
        if (events[key]) {
            const ev = events[key];
            if (ev.isHoliday) dayDiv.classList.add('is-holiday');
            
            // ПІДСВІЧУВАННЯ ТУТ
            if (highlightedEventName && ev.name === highlightedEventName) {
                dayDiv.classList.add('highlighted');
            }

            const matches = ev.name?.toLowerCase().includes(query) || ev.cls?.toLowerCase().includes(query);
            if (matches) {
                const label = ev.cls ? ev.cls : (ev.student ? ev.student : ev.name);
                dayDiv.innerHTML = `<span class="date-num">${i}</span><div class="ev-badge cat-${ev.category}">${label}</div>`;
                
                // Збираємо дані для статистики
                if (ev.name) {
                    if (!statsData[ev.name]) statsData[ev.name] = { count: 0, category: ev.category };
                    statsData[ev.name].count++;
                }
            } else {
                dayDiv.innerHTML = `<span class="date-num">${i}</span>`;
            }
        } else {
            dayDiv.innerHTML = `<span class="date-num">${i}</span>`;
        }
        
        dayDiv.onclick = () => openForm(i);
        grid.appendChild(dayDiv);
    }

    // Рендеримо статистику як список кнопок
    let h = '';
    for (let name in statsData) {
        const isActive = highlightedEventName === name ? 'active' : '';
        h += `
        <div class="stat-item ${isActive}" onclick="toggleHighlight('${name}')">
            <div class="stat-row">
                <span><span class="stat-dot" style="background:var(--clr-${statsData[name].category})"></span>${name}</span>
                <b>${statsData[name].count}</b>
            </div>
        </div>`;
    }
    document.getElementById('statsContent').innerHTML = h || '<p style="font-size:13px;color:#999">Заходів не знайдено</p>';
  };

  window.toggleHighlight = function(name) {
    if (highlightedEventName === name) {
        highlightedEventName = null; // Вимкнути
    } else {
        highlightedEventName = name; // Увімкнути
    }
    render();
  };

  window.openForm = function(day) {
    window.selKey = `${currYear}-${currMonth}-${day}`;
    document.getElementById('selectedDateText').innerText = `${day} ${months[currMonth]}`;
    document.getElementById('eventForm').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    let data = events[window.selKey] || {name:'', cls:'', teacher:'', student:'', det:'', category:'акція', isHoliday:false};
    document.getElementById('eventName').value = data.name || '';
    document.getElementById('eventClass').value = data.cls || '';
    document.getElementById('eventTeacher').value = data.teacher || '';
    document.getElementById('eventStudent').value = data.student || '';
    document.getElementById('eventDetails').value = data.det || '';
    document.getElementById('eventCategory').value = data.category;
    document.getElementById('isHoliday').checked = data.isHoliday;
  };

  window.goToday = function() { let now = new Date(); currMonth = now.getMonth(); currYear = now.getFullYear(); render(); };
  window.changeMonth = function(s) { currMonth += s; if (currMonth < 0) { currMonth = 11; currYear--; } if (currMonth > 11) { currMonth = 0; currYear++; } render(); };
  window.closeAll = function() { document.getElementById('eventForm').style.display='none'; document.getElementById('overlay').style.display='none'; };
  render();
</script>
</body>
</html>
